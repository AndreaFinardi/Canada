<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <rect width="1200" height="1600" fill="#e7e1d5"/>
  <rect x="72" y="58" width="1056" height="1484" rx="10" fill="#fdfbf4" stroke="#d0c5b4" stroke-width="3"/>
  <g opacity=".23" stroke="#789fb8" stroke-width="2">
    <path d="M120 250h960M120 338h960M120 426h960M120 514h960M120 602h960M120 690h960M120 778h960M120 866h960M120 954h960M120 1042h960M120 1130h960M120 1218h960M120 1306h960M120 1394h960"/>
  </g>
  <g fill="#243a51" font-family="cursive" font-size="47" font-style="italic">
    <text x="145" y="180">Ciao,</text>
    <text x="145" y="300">non devi essere forte ogni giorno.</text>
    <text x="145" y="388">A volte basta fermarsi, respirare</text>
    <text x="145" y="476">e ricordarsi quanta strada hai già fatto.</text>
    <text x="145" y="660">Il Canada sarà pieno di cose nuove.</text>
    <text x="145" y="748">Noi saremo sempre a una chiamata</text>
    <text x="145" y="836">o a una lettera di distanza.</text>
    <text x="145" y="1020">Credi in te stessa almeno quanto</text>
    <text x="145" y="1108">crediamo noi in te.</text>
    <text x="145" y="1288">Un abbraccio grande,</text>
    <text x="765" y="1410" font-size="72">Luca</text>
  </g>
  <circle cx="975" cy="180" r="82" fill="none" stroke="#a82033" stroke-width="8" opacity=".65"/>
  <text x="930" y="198" fill="#a82033" font-family="Arial" font-size="54">🍁</text>
</svg>
