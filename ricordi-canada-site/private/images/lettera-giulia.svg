<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <rect width="1200" height="1600" fill="#f2eadb"/>
  <rect x="70" y="55" width="1060" height="1490" rx="8" fill="#fffdf7" stroke="#d8cbb9" stroke-width="3"/>
  <g opacity=".28" stroke="#88a9bd" stroke-width="2">
    <path d="M115 250h970M115 335h970M115 420h970M115 505h970M115 590h970M115 675h970M115 760h970M115 845h970M115 930h970M115 1015h970M115 1100h970M115 1185h970M115 1270h970M115 1355h970"/>
  </g>
  <path d="M155 100v1350" stroke="#dc8d93" stroke-width="3" opacity=".55"/>
  <g fill="#3d4b5d" font-family="cursive" font-size="48" font-style="italic">
    <text x="195" y="190">Cara amica,</text>
    <text x="195" y="300">anche dall'altra parte dell'oceano,</text>
    <text x="195" y="385">ricordati che qui avrai sempre un posto</text>
    <text x="195" y="470">che ti aspetta.</text>
    <text x="195" y="640">La distanza cambierà le nostre giornate,</text>
    <text x="195" y="725">ma non ciò che abbiamo vissuto insieme.</text>
    <text x="195" y="895">Quando sentirai nostalgia, pensa alle</text>
    <text x="195" y="980">nostre risate e alle avventure future.</text>
    <text x="195" y="1190">Con tutto il mio affetto,</text>
    <text x="735" y="1320" font-size="70">Giulia</text>
  </g>
  <path d="M950 140 970 195l38-21-10 48 52-8-31 44 43 18-51 26 13 43-57-13v76h-36v-76l-57 13 13-43-51-26 43-18-31-44 52 8-10-48 38 21Z" fill="#a82033" opacity=".82"/>
</svg>
